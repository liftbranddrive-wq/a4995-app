# DigitalOcean App Platform spec
# Tells DigitalOcean this repo is a static website (no build step needed).
# Auto-detected when this file lives at .do/app.yaml in the repo root.

name: a4995-app
region: nyc

static_sites:
  - name: web
    source_dir: /
    output_dir: /
    index_document: index.html
    error_document: index.html
    catchall_document: index.html
    routes:
      - path: /
